<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pending Verification - AuraStitch AI</title>
  
  <link rel="stylesheet" href="./assets/css/variables.css">
  <link rel="stylesheet" href="./assets/css/theme.css">
  <link rel="stylesheet" href="./assets/css/animations.css">
  <link rel="stylesheet" href="./assets/css/common.css">
  
  <style>
    .verification-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, var(--bg-primary), var(--bg-tertiary));
    }
    
    .verification-card {
      width: 90%;
      max-width: 500px;
      padding: 50px 40px;
      text-align: center;
      border-radius: var(--border-radius-lg);
    }
    
    .status-badge {
      display: inline-block;
      background-color: rgba(197, 160, 89, 0.15);
      color: var(--accent-gold-dark);
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 24px;
      border: 1px solid rgba(197, 160, 89, 0.3);
    }
  </style>
</head>
<body>

  <div class="verification-container">
    <div class="verification-card glass-panel fade-in slide-up">
      <div style="font-size:56px; margin-bottom:20px; animation:spin 3s infinite linear;">⏳</div>
      
      <span class="status-badge">DOCUMENT UNDER REVIEW</span>
      
      <h2 style="font-family:var(--font-heading); font-size:32px; margin-bottom:16px;">We are verifying your profile</h2>
      <p style="color:var(--text-secondary); font-size:15px; line-height:1.6; margin-bottom:30px;">
        Thank you for joining AuraStitch AI! To ensure the highest standard of craftsmanship, our compliance team is verifying your shop details and government IDs. This usually takes between 24-48 hours.
      </p>
      
      <div style="display:flex; flex-direction:column; gap:12px; max-width:280px; margin:0 auto;">
        <a href="./index.html" class="btn-primary">Return to Home</a>
        <a href="./login.html" class="btn-secondary">Log in with another account</a>
      </div>
    </div>
  </div>

  <script src="./assets/js/theme.js"></script>
  <script src="./assets/js/common.js"></script>
</body>
</html>
