<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Account - AuraStitch AI</title>
  
  <link rel="stylesheet" href="./assets/css/variables.css">
  <link rel="stylesheet" href="./assets/css/theme.css">
  <link rel="stylesheet" href="./assets/css/animations.css">
  <link rel="stylesheet" href="./assets/css/common.css">
  
  <style>
    .register-container {
      width: 100vw;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
      background: linear-gradient(135deg, var(--bg-primary), var(--bg-tertiary));
    }
    
    .register-card {
      width: 100%;
      max-width: 600px;
      padding: 40px;
      border-radius: var(--border-radius-lg);
    }
    
    .role-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-bottom: 30px;
    }
    
    .role-card {
      padding: 20px;
      text-align: center;
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius-md);
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    
    .role-card:hover, .role-card.active {
      border-color: var(--accent-gold);
      background-color: var(--bg-tertiary);
    }
    
    .role-card.active {
      box-shadow: 0 0 15px var(--accent-gold-glow);
    }
    
    .role-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }
    
    .dynamic-form-section {
      display: none;
    }
    
    .dynamic-form-section.active {
      display: block;
    }
  </style>
</head>
<body>

  <div class="register-container">
    <div class="register-card glass-panel fade-in slide-up">
      <div style="text-align:center; margin-bottom:10px;">
        <a href="./index.html" style="font-family:var(--font-heading); font-size:28px; font-weight:700; color:var(--text-primary);">
          Aura<span style="color:var(--accent-gold)">Stitch</span>
        </a>
      </div>
      
      <h2 style="text-align:center; font-family:var(--font-heading); font-size:32px; margin-bottom:8px;">Create Account</h2>
      <p style="text-align:center; color:var(--text-secondary); font-size:15px; margin-bottom:30px;">Choose account type to start</p>
      
      <!-- Step 1: Account Type Selection Grid -->
      <div class="role-grid">
        <div class="role-card" data-role="customer">
          <div class="role-icon">👤</div>
          <h4 style="font-size:14px; font-weight:600;">Customer</h4>
        </div>
        <div class="role-card" data-role="tailor">
          <div class="role-icon">✂</div>
          <h4 style="font-size:14px; font-weight:600;">Fashion Tailor</h4>
        </div>
        <div class="role-card" data-role="weaver">
          <div class="role-icon">🥻</div>
          <h4 style="font-size:14px; font-weight:600;">Handloom Weaver</h4>
        </div>
        <div class="role-card" data-role="supplier">
          <div class="role-icon">🧶</div>
          <h4 style="font-size:14px; font-weight:600;">Textile Supplier</h4>
        </div>
      </div>
      
      <!-- Step 2: Dynamic Form Fields based on role selection -->
      <form id="dynamic-signup-form">
        <!-- Customer Form Fields -->
        <div class="dynamic-form-section" id="form-customer">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-input" placeholder="e.g. John Doe">
          </div>
          <div class="form-group">
            <label class="form-label">Phone Number</label>
            <input type="text" class="form-input" placeholder="e.g. +91 9876543210">
          </div>
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-input" placeholder="e.g. customer@aurastitch.ai">
          </div>
        </div>
        
        <!-- Tailor Form Fields -->
        <div class="dynamic-form-section" id="form-tailor">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-input" placeholder="Tailor Name">
          </div>
          <div class="form-group">
            <label class="form-label">Shop Name</label>
            <input type="text" class="form-input" placeholder="Fashion Shop Name">
          </div>
          <div class="form-group">
            <label class="form-label">Address</label>
            <input type="text" class="form-input" placeholder="Shop Street Address">
          </div>
          <div class="form-group">
            <label class="form-label">Years of Experience</label>
            <input type="number" class="form-input" placeholder="e.g. 5">
          </div>
          <div class="form-group">
            <label class="form-label">Specialization</label>
            <input type="text" class="form-input" placeholder="e.g. Bridal Blouses, Lehenga">
          </div>
          <div class="form-group">
            <label class="form-label">Upload Government ID File</label>
            <input type="file" class="form-input">
          </div>
        </div>
        
        <!-- Weaver Form Fields -->
        <div class="dynamic-form-section" id="form-weaver">
          <div class="form-group">
            <label class="form-label">Artisan Name</label>
            <input type="text" class="form-input" placeholder="Weaver Name">
          </div>
          <div class="form-group">
            <label class="form-label">Business Name</label>
            <input type="text" class="form-input" placeholder="Weaving Loom Business">
          </div>
          <div class="form-group">
            <label class="form-label">State of Origin</label>
            <input type="text" class="form-input" placeholder="e.g. Andhra Pradesh">
          </div>
          <div class="form-group">
            <label class="form-label">Traditional Weaving Type</label>
            <input type="text" class="form-input" placeholder="e.g. Pochampally, Ikat, silk">
          </div>
          <div class="form-group">
            <label class="form-label">Upload Artisan ID / Govt ID</label>
            <input type="file" class="form-input">
          </div>
        </div>
        
        <!-- Supplier Form Fields -->
        <div class="dynamic-form-section" id="form-supplier">
          <div class="form-group">
            <label class="form-label">Owner Name</label>
            <input type="text" class="form-input" placeholder="Wholesaler Owner Name">
          </div>
          <div class="form-group">
            <label class="form-label">Shop Name</label>
            <input type="text" class="form-input" placeholder="Textiles Shop Name">
          </div>
          <div class="form-group">
            <label class="form-label">Product Categories</label>
            <input type="text" class="form-input" placeholder="e.g. Silk fabrics, Borders, Beads">
          </div>
          <div class="form-group">
            <label class="form-label">Upload Trade License / Govt ID</label>
            <input type="file" class="form-input">
          </div>
        </div>
        
        <!-- Common Credentials Fields -->
        <div id="credentials-common-section" style="display:none; margin-top:20px;">
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-input" placeholder="••••••••" required>
          </div>
          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-input" placeholder="••••••••" required>
          </div>
          
          <button type="submit" class="btn-primary" style="width:100%; margin-top:20px;">Complete Registration</button>
        </div>
      </form>
    </div>
  </div>

  <script src="./assets/js/theme.js"></script>
  <script src="./assets/js/common.js"></script>
  
  <script>
    let selectedRole = '';
    
    // Choose role trigger
    document.querySelectorAll('.role-card').forEach(card => {
      card.addEventListener('click', () => {
        // Toggle selected active state
        document.querySelectorAll('.role-card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
        
        selectedRole = card.getAttribute('data-role');
        
        // Hide all form panels, reveal matching one
        document.querySelectorAll('.dynamic-form-section').forEach(form => form.classList.remove('active'));
        document.getElementById(`form-${selectedRole}`).classList.add('active');
        
        // Show passwords and submit triggers
        document.getElementById('credentials-common-section').style.display = 'block';
      });
    });
    
    // Dynamic Registration form submissions router
    document.getElementById('dynamic-signup-form').addEventListener('submit', (e) => {
      e.preventDefault();
      
      window.AuraToasts.show("Registering your account...", "info");
      
      setTimeout(() => {
        if (selectedRole === 'customer') {
          window.AuraToasts.show("Registration Successful. Please Login.", "success");
          setTimeout(() => {
            window.location.href = './login.html';
          }, 1000);
        } else {
          // Tailor, weaver, supplier go to verification pending queue page
          window.location.href = './pending-verification.html';
        }
      }, 1200);
    });
  </script>
</body>
</html>
